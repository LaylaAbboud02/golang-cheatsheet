<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="A single-page Go reference with quick examples for syntax, tooling, standard library patterns, and common workflows.">
  <title>Golang Cheat Sheet</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <header class="header">
      <div class="header-top">
        <div class="header-brand">
          <div class="go-logo">Go</div>
          <div>
            <h1>Go Cheat Sheet</h1>
            <p>Practical reference for Go 1.22+</p>
          </div>
        </div>
        <button class="theme-toggle" id="theme-toggle" type="button" aria-pressed="false">Night mode</button>
      </div>
    </header>

    <div class="toolbar">
      <div class="search-panel">
        <label class="search-label" for="topic-search">Search topics</label>
        <div class="search-row">
          <input class="search-input" id="topic-search" type="search" placeholder="Search syntax, slices, goroutines, testing..." autocomplete="off">
          <button class="search-clear" id="search-clear" type="button" aria-label="Clear search" hidden>Clear</button>
        </div>
      </div>

      <div class="level-filters" aria-label="Filter by skill level">
        <button class="level-btn active" type="button" data-level-filter="all">All</button>
        <button class="level-btn" type="button" data-level-filter="beginner">Beginner</button>
        <button class="level-btn" type="button" data-level-filter="intermediate">Intermediate</button>
        <button class="level-btn" type="button" data-level-filter="advanced">Advanced</button>
      </div>

      <nav class="nav" id="nav" aria-label="Cheat sheet sections"></nav>
      <p class="result-status" id="result-status" aria-live="polite"></p>
    </div>
    <p class="empty-state" id="empty-state" hidden>No matching topics found.</p>
    <div id="sections"></div>
  </main>

  <script src="src/data/sections.js"></script>
  <script src="src/data/metadata.js"></script>
  <script src="src/utils.js"></script>
  <script src="src/app.js"></script>
  <script src="script.js"></script>
</body>
</html>
